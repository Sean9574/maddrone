    odom0: '/qvio_enu'

    odom0_config: [
      true,  true,  true,
      true,  true,  true,
      true,  true,  true,
      false, false, false,
      false, false, false
    ]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    imu0: /imu_apps
    imu0_config: [
      false, false, false,
      false, false, false,
      false, false, false,
      true,  true,  true,
      true,  true,  true
    ]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true